name: CI

on:
  push:
    branches: [main, "spike/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Lints the workflow YAML itself (plus shellcheck over inline run: blocks,
  # preinstalled on ubuntu-latest). Workflows are otherwise only exercised at
  # push/tag time, so wiring bugs would surface mid-release. `go run` verifies
  # the module against the Go checksum database, keeping the pin immutable.
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color

  check:
    name: fmt · clippy · test (macOS)
    # Apple Silicon runner: Metal is available for the llama-cpp-2 build, and
    # Xcode + cmake are preinstalled (the native llama.cpp build needs them).
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      # Root model-inference tests in model_client/tests/latency.rs are
      # #[ignore]d because they need a local GGUF; the tag-release wrapper runs
      # them CPU-forced. The separate spike integration test remains the
      # Metal/GPU-oriented path, so the default branch run stays hermetic.
      # Note: a few platform_macos tests share the process-wide NSPasteboard and
      # are serialized to avoid cross-test pasteboard state leaks.
      - name: Test
        run: cargo test --locked --workspace --all-targets -- --test-threads=1

      - name: Build
        run: cargo build --locked --workspace --all-targets

      - name: Build macOS acceptance examples
        run: cargo build --locked -p platform_macos --examples

      - name: Script syntax
        run: |
          find tools/acceptance tools/bundle tools/release -type f -name '*.sh' \
            ! -path 'tools/acceptance/run-a2-compat-gates.sh' \
            ! -path 'tools/release/check-a2-matrix-ledger.sh' -print0 \
            | xargs -0 bash -n

      - name: Bundle metadata
        run: tools/bundle/check-bundle-metadata.sh

      - name: Bundle metadata self-test
        run: tools/bundle/check-bundle-metadata.sh --self-test

      - name: Release version validator self-test
        run: tools/release/validate-version.sh --self-test

      - name: Homebrew cask syntax
        run: ruby -c Casks/compme.rb

      - name: Bundle assembler self-test
        run: tools/bundle/make-app.sh --self-test

      - name: Bundle icon generator self-test
        run: tools/bundle/make-icon.sh --self-test

      - name: Bundle smoke
        run: tools/bundle/bundle-smoke.sh

      - name: Bundle smoke self-test
        run: tools/bundle/bundle-smoke.sh --self-test

      - name: E2E runner self-test
        run: tools/acceptance/e2e-complete-me.sh --self-test

      - name: Missing-model startup self-test
        run: tools/acceptance/missing-model-startup.sh --self-test

      - name: Missing-model startup product smoke
        run: tools/acceptance/missing-model-startup.sh

      - name: UI-assisted session self-test
        run: tools/acceptance/run-ui-assisted-session.sh --self-test

      - name: A1b runner self-test
        run: tools/acceptance/run-a1b-live-gates.sh --self-test

      - name: Model client feature policy
        run: tools/release/check-model-client-features.sh

      - name: Model client feature policy self-test
        run: tools/release/check-model-client-features.sh --self-test

      - name: Agent brief alignment
        run: tools/release/check-agent-briefs.sh

      - name: Agent brief alignment self-test
        run: tools/release/check-agent-briefs.sh --self-test

      - name: Privacy policy
        run: tools/release/check-privacy-policy.sh

      - name: Privacy policy self-test
        run: tools/release/check-privacy-policy.sh --self-test

      - name: GitHub governance checker self-test
        run: tools/release/check-github-governance.sh --self-test

      - name: Release model gate policy
        run: bash tools/release/check-model-gates.sh

      - name: Release model gate self-test
        run: tools/release/run-model-gates.sh --self-test

      - name: Release cask updater self-test
        run: tools/release/update-cask.sh --self-test

      - name: Release cask finalizer self-test
        run: tools/release/finalize-cask.sh --self-test

      - name: Notarization helper self-test
        run: tools/release/notarize-app.sh --self-test

      - name: Update manifest self-test
        run: tools/release/write-update-manifest.sh --self-test

  spike:
    name: spike fmt · clippy · test · build (macOS)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          # tools/spike is excluded from the root workspace, so the default
          # ". -> target" mapping never caches tools/spike/target — including
          # the native llama.cpp build, which otherwise recompiles cold on
          # every run.
          workspaces: tools/spike

      - name: Format spike workspace
        working-directory: tools/spike
        run: cargo fmt -- --check

      - name: Clippy spike workspace
        working-directory: tools/spike
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test spike workspace
        working-directory: tools/spike
        run: cargo test --locked

      - name: Build spike binaries
        working-directory: tools/spike
        run: cargo build --locked --bins

  windows:
    name: portable workspace + platform_windows (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      # The whole workspace minus `platform_macos` (Apple frameworks). This
      # gates portability leaks in shared crates and proves the app binary
      # still compiles through its fail-closed Windows facade.
      - name: Format (workspace)
        run: cargo fmt --all -- --check

      - name: Clippy portable workspace (deny warnings)
        run: cargo clippy --locked --workspace --exclude platform_macos --all-targets -- -D warnings

      - name: Test portable workspace
        run: cargo test --locked --workspace --exclude platform_macos

      - name: Build app binary
        run: cargo build --locked -p app

  linux:
    name: portable workspace + platform_linux (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          # cargo-audit clones the RustSec advisory DB outside rust-cache's
          # default paths; cache it alongside the cargo-installed binary.
          cache-directories: ~/.cargo/advisory-db

      # The whole workspace minus `platform_macos` (Apple frameworks). This
      # gates portability leaks in shared crates and proves the app binary
      # still compiles through its fail-closed Linux facade.
      - name: Format (workspace)
        run: cargo fmt --all -- --check

      - name: Clippy portable workspace (deny warnings)
        run: cargo clippy --locked --workspace --exclude platform_macos --all-targets -- -D warnings

      # Platform-independent (reads Cargo.lock only); lives in the Linux job
      # so the premium macOS lane never pays the cargo-audit compile.
      - name: Rust dependency audit
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit

      - name: Test portable workspace
        run: cargo test --locked --workspace --exclude platform_macos

      - name: Build app binary
        run: cargo build --locked -p app
