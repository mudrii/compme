name: CI

on:
  push:
    branches: [main, "spike/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (macOS)
    # Apple Silicon runner: Metal is available for the llama-cpp-2 build, and
    # Xcode + cmake are preinstalled (the native llama.cpp build needs them).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      # Model-inference tests in model_client/tests/latency.rs are #[ignore]d
      # (they need a local GGUF + Metal GPU), so the default run is hermetic.
      # Note: a few platform_macos tests share the process-wide NSPasteboard and
      # are serialized to avoid cross-test pasteboard state leaks.
      - name: Test
        run: cargo test --locked --workspace --all-targets -- --test-threads=1

      - name: Build
        run: cargo build --locked --workspace --all-targets

      - name: Build macOS acceptance examples
        run: cargo build --locked -p platform_macos --examples

      - name: Script syntax
        run: bash -n tools/acceptance/*.sh tools/bundle/*.sh tools/release/*.sh

      - name: Bundle metadata
        run: tools/bundle/check-bundle-metadata.sh

      - name: Bundle metadata self-test
        run: tools/bundle/check-bundle-metadata.sh --self-test

      - name: Bundle assembler self-test
        run: tools/bundle/make-app.sh --self-test

      - name: E2E runner self-test
        run: tools/acceptance/e2e-complete-me.sh --self-test

      - name: Missing-model startup self-test
        run: tools/acceptance/missing-model-startup.sh --self-test

      - name: Missing-model startup product smoke
        run: tools/acceptance/missing-model-startup.sh

      - name: A1b runner self-test
        run: tools/acceptance/run-a1b-live-gates.sh --self-test

      - name: A2 compatibility runner self-test
        run: tools/acceptance/run-a2-compat-gates.sh --self-test

      - name: A2 matrix ledger policy self-test
        run: tools/release/check-a2-matrix-ledger.sh --self-test

      - name: Model client feature policy
        run: tools/release/check-model-client-features.sh

      - name: Model client feature policy self-test
        run: tools/release/check-model-client-features.sh --self-test

      - name: Agent brief alignment
        run: tools/release/check-agent-briefs.sh

      - name: Agent brief alignment self-test
        run: tools/release/check-agent-briefs.sh --self-test

      - name: Privacy policy
        run: tools/release/check-privacy-policy.sh

      - name: Privacy policy self-test
        run: tools/release/check-privacy-policy.sh --self-test

      - name: Release model gate policy
        run: bash tools/release/check-model-gates.sh

      - name: Release model gate self-test
        run: tools/release/run-model-gates.sh --self-test

      - name: Release cask updater self-test
        run: tools/release/update-cask.sh --self-test

      - name: Release cask finalizer self-test
        run: tools/release/finalize-cask.sh --self-test

      - name: Notarization helper self-test
        run: tools/release/notarize-app.sh --self-test

      - name: Update manifest self-test
        run: tools/release/write-update-manifest.sh --self-test

  spike:
    name: spike fmt · clippy · test · build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Format spike workspace
        working-directory: tools/spike
        run: cargo fmt -- --check

      - name: Clippy spike workspace
        working-directory: tools/spike
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test spike workspace
        working-directory: tools/spike
        run: cargo test --locked

      - name: Build spike binaries
        working-directory: tools/spike
        run: cargo build --locked --bins

  windows:
    name: platform_windows fmt · clippy · test · build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      # Scoped to the Windows adapter crate (+ its `platform` contract dep): the
      # rest of the workspace (platform_macos / app / engine / model_client) is
      # macOS-only and does not build here. Today this gates an inert stub; it
      # becomes the real gate for the UIA / WH_KEYBOARD_LL / SendInput
      # implementation once that lands behind `#[cfg(windows)]` (and the Windows
      # deps are uncommented in crates/platform_windows/Cargo.toml).
      - name: Format
        run: cargo fmt -p platform_windows -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked -p platform_windows --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked -p platform_windows

      - name: Build
        run: cargo build --locked -p platform_windows

  linux:
    name: platform_linux fmt · clippy · test · build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      # Scoped to the Linux adapter crate (+ its `platform` contract dep). Today
      # this gates an inert stub; it becomes the real gate for the AT-SPI2 /
      # XTEST / wtype / IBus implementation once that lands behind
      # `#[cfg(target_os = "linux")]`. System libraries (e.g. at-spi2-core,
      # libxtst) get an apt install step here when the real deps are uncommented.
      - name: Format
        run: cargo fmt -p platform_linux -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked -p platform_linux --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked -p platform_linux

      - name: Build
        run: cargo build --locked -p platform_linux
