name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release gates (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Root format
        run: cargo fmt --all -- --check

      - name: Root clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Root tests
        run: cargo test --workspace --all-targets -- --test-threads=1

      - name: Model-backed release gates
        run: bash tools/release/run-model-gates.sh

      - name: Root build
        run: cargo build --workspace --all-targets

      - name: Script syntax
        run: bash -n tools/acceptance/*.sh tools/bundle/*.sh tools/release/*.sh

      - name: Bundle metadata
        run: tools/bundle/check-bundle-metadata.sh

      - name: Bundle assembler self-test
        run: tools/bundle/make-app.sh --self-test

      - name: A1b runner self-test
        run: tools/acceptance/run-a1b-live-gates.sh --self-test

      - name: A2 compatibility runner self-test
        run: tools/acceptance/run-a2-compat-gates.sh --self-test

      - name: E2E runner self-test
        run: tools/acceptance/e2e-complete-me.sh --self-test

      - name: Missing-model startup self-test
        run: tools/acceptance/missing-model-startup.sh --self-test

      - name: Missing-model startup product smoke
        run: tools/acceptance/missing-model-startup.sh

      - name: Model client feature policy
        run: tools/release/check-model-client-features.sh

      - name: Release model gate policy
        run: bash tools/release/check-model-gates.sh

      - name: Release cask updater self-test
        run: tools/release/update-cask.sh --self-test

      - name: Spike gates
        working-directory: tools/spike
        run: |
          cargo fmt -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo build --bins

  release:
    name: Build · bundle · publish (macOS)
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: validate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Reuse the project's own bundler so the released .app matches a local
      # build exactly: release binary -> Compme.app (Info.plist, compme://
      # scheme, launch-at-login) -> ad-hoc signed (-s -). Real Developer-ID
      # codesign/notarization is a human-gated follow-up.
      - name: Build the .app bundle
        run: tools/bundle/make-app.sh "$RUNNER_TEMP/bundle"

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

      - name: Package + checksum
        id: pkg
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          zip="compme-${version}-macos.zip"
          # ditto preserves the .app bundle structure + resource forks.
          ditto -c -k --keepParent "$RUNNER_TEMP/bundle/Compme.app" "$zip"
          sha="$(shasum -a 256 "$zip" | awk '{print $1}')"
          printf '%s  %s\n' "$sha" "$zip" > "$zip.sha256"
          {
            echo "version=$version"
            echo "zip=$zip"
            echo "sha256=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.zip }}.sha256

      # The cask's sha256 can only be known after the artifact is built, so it
      # is finalized out-of-band (see docs/RELEASING.md). Surface the exact
      # values here so the maintainer can run tools/release/update-cask.sh.
      - name: Cask update instructions
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
          SHA256: ${{ steps.pkg.outputs.sha256 }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## Homebrew cask"
            echo "Finalize \`Casks/compme.rb\` for this release:"
            echo '```sh'
            echo "tools/release/update-cask.sh \"$TAG\""
            echo "git add Casks/compme.rb"
            echo "git commit -m \"chore(release): cask $TAG\" && git push"
            echo '```'
            echo "version: \`$VERSION\`"
            echo "sha256:  \`$SHA256\`"
          } >> "$GITHUB_STEP_SUMMARY"
