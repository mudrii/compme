name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Serialize every release run under one fixed group (not per-ref): finalize-cask.sh
# pushes a cask commit to main, so two concurrent tag releases would race that push.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Preflight release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify release tag is semver and on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$REF_PROTECTED" != "true" ]; then
            echo "release tag must match a protected v* ruleset" >&2
            exit 1
          fi
          if ! [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)(-([0-9A-Za-z-]+[.])*[0-9A-Za-z-]+)?$ ]]; then
            echo "release tag must look like vX.Y.Z: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          case "$version" in
            *[!0-9A-Za-z.-]* | *..* | .* | *.)
              echo "release tag contains invalid version text: $GITHUB_REF_NAME" >&2
              exit 1
              ;;
          esac
          git fetch origin "$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

  validate:
    name: Validate release gates (macOS)
    needs: [preflight]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Root format
        run: cargo fmt --all -- --check

      - name: Root clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Root tests
        run: cargo test --locked --workspace --all-targets -- --test-threads=1

      # Correctness only on the hosted runner: virtualized macOS has no usable
      # Metal, so the 500ms warm-latency budget is enforced by the mandatory
      # pre-tag run on a real Mac (RELEASING step 3), not here.
      - name: Model-backed release gates
        env:
          COMPME_REQUIRE_LATENCY_BUDGET: "0"
        run: bash tools/release/run-model-gates.sh

      - name: Root build
        run: cargo build --locked --workspace --all-targets

      - name: Script syntax
        run: bash -n tools/acceptance/*.sh tools/bundle/*.sh tools/release/*.sh

      - name: Bundle metadata
        run: tools/bundle/check-bundle-metadata.sh

      - name: Bundle metadata self-test
        run: tools/bundle/check-bundle-metadata.sh --self-test

      - name: Bundle assembler self-test
        run: tools/bundle/make-app.sh --self-test

      - name: Bundle smoke
        run: tools/bundle/bundle-smoke.sh

      - name: Bundle smoke self-test
        run: tools/bundle/bundle-smoke.sh --self-test

      - name: A1b runner self-test
        run: tools/acceptance/run-a1b-live-gates.sh --self-test

      - name: A2 compatibility runner self-test
        run: tools/acceptance/run-a2-compat-gates.sh --self-test

      - name: A2 matrix ledger policy self-test
        run: tools/release/check-a2-matrix-ledger.sh --self-test

      - name: A2 matrix ledger live proof
        env:
          COMPME_A2_MATRIX_LEDGER: ${{ vars.COMPME_A2_MATRIX_LEDGER }}
        run: |
          set -euo pipefail
          if [ -z "${COMPME_A2_MATRIX_LEDGER:-}" ]; then
            echo "missing required release variable: COMPME_A2_MATRIX_LEDGER" >&2
            echo "Run tools/acceptance/run-a2-compat-gates.sh matrix with COMPME_A2_LOG_DIR under tools/acceptance/evidence/a2/, commit the TSV + row logs, and set this variable to that repo-relative TSV path." >&2
            exit 1
          fi
          case "$COMPME_A2_MATRIX_LEDGER" in
            tools/acceptance/evidence/a2/*.tsv) ;;
            *)
              echo "COMPME_A2_MATRIX_LEDGER must be a committed repo-relative TSV under tools/acceptance/evidence/a2/: $COMPME_A2_MATRIX_LEDGER" >&2
              exit 1
              ;;
          esac
          tools/release/check-a2-matrix-ledger.sh "$COMPME_A2_MATRIX_LEDGER"

      - name: E2E runner self-test
        run: tools/acceptance/e2e-complete-me.sh --self-test

      - name: Missing-model startup self-test
        run: tools/acceptance/missing-model-startup.sh --self-test

      - name: Missing-model startup product smoke
        run: tools/acceptance/missing-model-startup.sh

      - name: UI-assisted session self-test
        run: tools/acceptance/run-ui-assisted-session.sh --self-test

      - name: Model client feature policy
        run: tools/release/check-model-client-features.sh

      - name: Model client feature policy self-test
        run: tools/release/check-model-client-features.sh --self-test

      - name: Agent brief alignment
        run: tools/release/check-agent-briefs.sh

      - name: Agent brief alignment self-test
        run: tools/release/check-agent-briefs.sh --self-test

      - name: Privacy policy
        run: tools/release/check-privacy-policy.sh

      - name: Privacy policy self-test
        run: tools/release/check-privacy-policy.sh --self-test

      - name: Release model gate policy
        run: bash tools/release/check-model-gates.sh

      - name: Release model gate self-test
        run: tools/release/run-model-gates.sh --self-test

      - name: Release cask updater self-test
        run: tools/release/update-cask.sh --self-test

      - name: Release cask finalizer self-test
        run: tools/release/finalize-cask.sh --self-test

      - name: Notarization helper self-test
        run: tools/release/notarize-app.sh --self-test

      - name: Update manifest self-test
        run: tools/release/write-update-manifest.sh --self-test

      - name: Spike gates
        working-directory: tools/spike
        run: |
          cargo fmt -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked
          cargo build --locked --bins

  windows:
    name: platform_windows fmt · clippy · test · build (Windows)
    needs: [preflight]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format
        run: cargo fmt -p platform_windows -- --check

      - name: Clippy
        run: cargo clippy --locked -p platform_windows --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked -p platform_windows

      - name: Build
        run: cargo build --locked -p platform_windows

  linux:
    name: platform_linux fmt · clippy · test · build (Linux)
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format
        run: cargo fmt -p platform_linux -- --check

      - name: Clippy
        run: cargo clippy --locked -p platform_linux --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked -p platform_linux

      - name: Build
        run: cargo build --locked -p platform_linux

  # Compile the full third-party dependency tree (build.rs, proc-macro code) in
  # a job that carries ZERO release secrets and no `environment: release`. A
  # job boundary — not step ordering — separates untrusted build code from the
  # signing credentials: GitHub Actions does not kill background processes
  # between steps, so a daemon forked by a malicious build script would survive
  # into later steps of the same job, but it dies with this runner and never
  # sees the Developer-ID keychain or notarytool credentials. Cold build on
  # purpose (no rust-cache): cached artifacts must never feed the signed
  # release binary.
  prebuild:
    name: Prebuild release binary (macOS, no secrets)
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [validate, windows, linux]
    permissions:
      contents: read
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify release tag is on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch origin "$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"

      # Last authenticated git op in this job is the ancestry check above; drop
      # the checkout-persisted token before any third-party build code runs.
      - name: Scrub persisted git credentials
        run: git config --local --unset-all http.https://github.com/.extraheader || true

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.1

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

      - name: Prebuild release binary (no signing secrets in this job)
        run: cargo build --locked --release -p app

      - name: Upload prebuilt release binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compme-prebuilt-binary
          if-no-files-found: error
          path: target/release/compme

  # Signing job: consumes the binary built by the secretless prebuild job and
  # runs no cargo, no Rust toolchain, and no rust-cache — nothing untrusted
  # executes on the runner that holds the Developer-ID keychain and
  # notarization credentials. make-app.sh assembles from the downloaded binary
  # with COMPME_BUNDLE_SKIP_BUILD=1.
  build_release:
    name: Sign · bundle · package (macOS)
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [prebuild]
    environment: release
    permissions:
      contents: read
    runs-on: macos-14
    env:
      # Interim unsigned mode switch: the secrets context is not usable in
      # step `if:` conditions (Actions startup failure), so surface presence
      # as a job env value and gate the steps on that.
      COMPME_HAVE_SIGNING: ${{ secrets.COMPME_DEVELOPER_ID_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

      - name: Download prebuilt release binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: compme-prebuilt-binary
          path: target/release

      # actions/download-artifact drops file permissions; restore the
      # executable bit make-app.sh expects on target/release/compme.
      - name: Restore prebuilt binary executable bit
        run: chmod +x target/release/compme

      # Interim unsigned mode: with no Developer-ID secret configured this
      # step is skipped, COMPME_CODESIGN_IDENTITY stays unset, and make-app.sh
      # ad-hoc signs the bundle (Gatekeeper then requires the user's explicit
      # "Open Anyway" — documented in the cask caveats and release notes).
      # Configuring the secrets later flips releases back to signed+notarized
      # with no workflow change. A PARTIAL secret set still fails loud below.
      - name: Import Developer ID certificate
        if: ${{ env.COMPME_HAVE_SIGNING == 'true' }}
        env:
          P12_BASE64: ${{ secrets.COMPME_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.COMPME_DEVELOPER_ID_P12_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.COMPME_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          for name in P12_BASE64 P12_PASSWORD SIGNING_IDENTITY; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release secret: $name" >&2
              exit 1
            fi
          done
          keychain="$RUNNER_TEMP/compme-signing.keychain-db"
          keychain_password="$(uuidgen)"
          p12="$RUNNER_TEMP/developer-id.p12"
          trap 'rm -f "$p12"' EXIT
          printf '%s' "$P12_BASE64" | base64 --decode > "$p12"
          chmod 600 "$p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm -f "$p12"
          trap - EXIT
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | tr -d '"')
          {
            echo "COMPME_SIGNING_KEYCHAIN=$keychain"
            echo "COMPME_CODESIGN_IDENTITY=$SIGNING_IDENTITY"
          } >> "$GITHUB_ENV"

      # Reuse the project's own bundler so the released .app matches a local
      # build exactly: release binary -> Compme.app (Info.plist, compme://
      # scheme, launch-at-login) -> Developer-ID hardened-runtime signature.
      - name: Build the .app bundle
        run: COMPME_BUNDLE_SKIP_BUILD=1 tools/bundle/make-app.sh "$RUNNER_TEMP/bundle"

      # Notarization is only possible for Developer-ID-signed builds; it is
      # paired with the signing condition. If signing secrets exist but the
      # notary credentials don't, notarize-app.sh itself fails loud.
      - name: Notarize and staple the .app
        if: ${{ env.COMPME_HAVE_SIGNING == 'true' }}
        env:
          COMPME_NOTARYTOOL_KEY_BASE64: ${{ secrets.COMPME_NOTARYTOOL_KEY_BASE64 }}
          COMPME_NOTARYTOOL_KEY_ID: ${{ secrets.COMPME_NOTARYTOOL_KEY_ID }}
          COMPME_NOTARYTOOL_ISSUER: ${{ secrets.COMPME_NOTARYTOOL_ISSUER }}
          COMPME_NOTARYTOOL_APPLE_ID: ${{ secrets.COMPME_NOTARYTOOL_APPLE_ID }}
          COMPME_NOTARYTOOL_PASSWORD: ${{ secrets.COMPME_NOTARYTOOL_PASSWORD }}
          COMPME_NOTARYTOOL_TEAM_ID: ${{ secrets.COMPME_NOTARYTOOL_TEAM_ID }}
        run: tools/release/notarize-app.sh "$RUNNER_TEMP/bundle/Compme.app"

      - name: Delete signing keychain
        if: always()
        run: |
          set -euo pipefail
          if [ -n "${COMPME_SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$COMPME_SIGNING_KEYCHAIN" || true
          fi
          unset COMPME_SIGNING_KEYCHAIN COMPME_CODESIGN_IDENTITY
          {
            echo "COMPME_SIGNING_KEYCHAIN="
            echo "COMPME_CODESIGN_IDENTITY="
          } >> "$GITHUB_ENV"

      - name: Package + checksum
        id: pkg
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          zip="compme-${version}-macos.zip"
          # ditto preserves the .app bundle structure + resource forks.
          ditto -c -k --keepParent "$RUNNER_TEMP/bundle/Compme.app" "$zip"
          sha="$(shasum -a 256 "$zip" | awk '{print $1}')"
          printf '%s  %s\n' "$sha" "$zip" > "$zip.sha256"
          {
            echo "version=$version"
            echo "zip=$zip"
            echo "sha256=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Write update manifest
        id: manifest
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
          ZIP: ${{ steps.pkg.outputs.zip }}
          SHA256: ${{ steps.pkg.outputs.sha256 }}
        run: |
          set -euo pipefail
          manifest="compme-${VERSION}-update.json"
          tools/release/write-update-manifest.sh "$VERSION" "$ZIP" "$SHA256" > "$manifest"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: compme-release-artifacts
          if-no-files-found: error
          path: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.zip }}.sha256
            ${{ steps.manifest.outputs.manifest }}

  publish_release:
    name: Publish release · finalize cask
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [build_release]
    environment: release
    permissions:
      contents: write
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: compme-release-artifacts
          path: release-artifacts

      - name: Verify downloaded artifact checksum
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="compme-${VERSION}-macos.zip"
          cd release-artifacts
          test -f "$ZIP"
          test -f "$ZIP.sha256"
          shasum -a 256 -c "$ZIP.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          draft: true
          # A hyphen in the tag (v1.2.3-rc.1) marks a prerelease: GitHub then
          # excludes it from /releases/latest, which is the URL the app's
          # Check-for-Updates opens.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/compme-*-macos.zip
            release-artifacts/compme-*-macos.zip.sha256
            release-artifacts/compme-*-update.json

      - name: Undraft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false

      # The cask's sha256 can only be known after the artifact is built. Finalize
      # computes it from the locally downloaded artifact (it does not need the
      # release to be public), so it runs after undraft: a finalize failure then
      # leaves a public release without a cask update, never a cask on main
      # pointing at a draft-only 404 URL.
      # Prerelease tags never reach the cask: brew has no prerelease notion,
      # so bumping the cask to an rc would ship it to every `brew upgrade`.
      - name: Finalize Homebrew cask
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          ZIP="compme-${VERSION}-macos.zip"
          artifact_path="$PWD/release-artifacts/$ZIP"
          tools/release/finalize-cask.sh "$TAG" "$artifact_path" "$VERSION" "$DEFAULT_BRANCH"
