name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Serialize every release run under one fixed group (not per-ref): finalize-cask.sh
# pushes a cask commit to main, so two concurrent tag releases would race that push.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Preflight release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify release tag is valid and at default-branch HEAD
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$REF_PROTECTED" != "true" ]; then
            echo "release tag must match a protected v* ruleset" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          tools/release/validate-version.sh "$version"
          # Explicit refspec: a bare fetch only guarantees FETCH_HEAD; whether
          # it also updates origin/<branch> depends on checkout's refspec
          # config, and a stale remote-tracking ref would fail this gate open.
          git fetch --force origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          default_sha="$(git rev-parse "origin/$DEFAULT_BRANCH")"
          if [ "$GITHUB_SHA" != "$default_sha" ]; then
            echo "release tag commit $GITHUB_SHA must equal current origin/$DEFAULT_BRANCH HEAD $default_sha" >&2
            exit 1
          fi

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

  validate:
    name: Validate release gates (macOS)
    needs: [preflight]
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # This job builds both the root workspace and tools/spike; spike is
          # excluded from the root workspace, so it needs its own cache entry
          # or the native llama.cpp build recompiles cold every release.
          workspaces: |
            .
            tools/spike
          # cargo-audit clones the RustSec advisory DB outside rust-cache's
          # default paths.
          cache-directories: ~/.cargo/advisory-db

      - name: Rust dependency audit
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit

      - name: Root format
        run: cargo fmt --all -- --check

      - name: Root clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Root tests (parallel)
        run: cargo test --locked --workspace --exclude platform_macos --exclude app --all-targets

      - name: Root tests (serial)
        run: cargo test --locked -p platform_macos -p app --all-targets -- --test-threads=1

      # Correctness only on the hosted runner: virtualized macOS has no usable
      # Metal, so the 500ms warm-latency budget is enforced by the mandatory
      # pre-tag run on a real Mac (RELEASING step 3), not here.
      - name: Model-backed release gates
        env:
          COMPME_REQUIRE_LATENCY_BUDGET: "0"
        run: bash tools/release/run-model-gates.sh

      # Corpus-based quality probe: reuses the pinned GGUF the step above
      # already downloaded and hash-verified, and fails when the corpus pass
      # rate drops below the pass threshold.
      - name: Model-quality gate
        run: bash tools/release/check-quality.sh

      - name: Root build
        run: cargo build --locked --workspace --all-targets

      - name: Build macOS acceptance examples
        run: cargo build --locked -p platform_macos --examples

      - name: Script syntax
        run: |
          find tools/acceptance tools/bundle tools/release -type f -name '*.sh' -print0 \
            | xargs -0 bash -n

      - name: Bundle metadata
        run: tools/bundle/check-bundle-metadata.sh

      - name: Bundle metadata self-test
        run: tools/bundle/check-bundle-metadata.sh --self-test

      - name: Version docs check
        run: tools/release/check-version-docs.sh

      - name: Version docs check self-test
        run: tools/release/check-version-docs.sh --self-test

      - name: Release version validator self-test
        run: tools/release/validate-version.sh --self-test

      - name: Homebrew cask syntax
        run: ruby -c Casks/compme.rb

      - name: Bundle assembler self-test
        run: tools/bundle/make-app.sh --self-test

      - name: Bundle icon generator self-test
        run: tools/bundle/make-icon.sh --self-test

      - name: Bundle smoke
        run: tools/bundle/bundle-smoke.sh

      - name: Bundle smoke self-test
        run: tools/bundle/bundle-smoke.sh --self-test

      - name: A1b runner self-test
        run: tools/acceptance/run-a1b-live-gates.sh --self-test

      - name: E2E runner self-test
        run: tools/acceptance/e2e-complete-me.sh --self-test

      - name: Missing-model startup self-test
        run: tools/acceptance/missing-model-startup.sh --self-test

      - name: Missing-model startup product smoke
        run: tools/acceptance/missing-model-startup.sh

      - name: UI-assisted session self-test
        run: tools/acceptance/run-ui-assisted-session.sh --self-test

      - name: Model client feature policy
        run: tools/release/check-model-client-features.sh

      - name: Model client feature policy self-test
        run: tools/release/check-model-client-features.sh --self-test

      - name: Agent brief alignment
        run: tools/release/check-agent-briefs.sh

      - name: Agent brief alignment self-test
        run: tools/release/check-agent-briefs.sh --self-test

      - name: Privacy policy
        run: tools/release/check-privacy-policy.sh

      - name: Privacy policy self-test
        run: tools/release/check-privacy-policy.sh --self-test

      - name: GitHub governance checker self-test
        run: tools/release/check-github-governance.sh --self-test

      - name: Release model gate policy
        run: bash tools/release/check-model-gates.sh

      - name: Release model gate self-test
        run: tools/release/run-model-gates.sh --self-test

      - name: Quality gate self-test
        run: tools/release/check-quality.sh --self-test

      - name: Release cask updater self-test
        run: tools/release/update-cask.sh --self-test

      - name: Release cask finalizer self-test
        run: tools/release/finalize-cask.sh --self-test

      - name: Notarization helper self-test
        run: tools/release/notarize-app.sh --self-test

      - name: Update manifest self-test
        run: tools/release/write-update-manifest.sh --self-test

      - name: Spike gates
        working-directory: tools/spike
        run: |
          cargo fmt -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked
          cargo build --locked --bins

  windows:
    name: portable workspace + platform_windows (Windows)
    needs: [preflight]
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # fmt runs once on the macOS lane (platform-independent); portable parity here is clippy/test/build.
      - name: Clippy portable workspace (deny warnings)
        run: cargo clippy --locked --workspace --exclude platform_macos --all-targets -- -D warnings

      - name: Test portable workspace
        run: cargo test --locked --workspace --exclude platform_macos

      - name: Build app binary
        run: cargo build --locked -p app

  linux:
    name: portable workspace + platform_linux (Linux)
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # fmt runs once on the macOS lane (platform-independent); portable parity here is clippy/test/build.
      - name: Clippy portable workspace (deny warnings)
        run: cargo clippy --locked --workspace --exclude platform_macos --all-targets -- -D warnings

      - name: Test portable workspace
        run: cargo test --locked --workspace --exclude platform_macos

      - name: Build app binary
        run: cargo build --locked -p app

  # Compile the full third-party dependency tree (build.rs, proc-macro code) in
  # a job that carries ZERO release secrets and no `environment: release`. A
  # job boundary — not step ordering — separates untrusted build code from the
  # signing credentials: GitHub Actions does not kill background processes
  # between steps, so a daemon forked by a malicious build script would survive
  # into later steps of the same job, but it dies with this runner and never
  # sees the Developer-ID keychain or notarytool credentials. Cold build on
  # purpose (no rust-cache): cached artifacts must never feed the signed
  # release binary.
  prebuild:
    name: Prebuild release binary (macOS, no secrets)
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [validate, windows, linux]
    permissions:
      contents: read
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify release tag is still at default-branch HEAD
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          # Explicit refspec: see the preflight fetch comment.
          git fetch --force origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          default_sha="$(git rev-parse "origin/$DEFAULT_BRANCH")"
          if [ "$GITHUB_SHA" != "$default_sha" ]; then
            echo "release tag commit $GITHUB_SHA must still equal current origin/$DEFAULT_BRANCH HEAD $default_sha before prebuild" >&2
            exit 1
          fi

      # Last authenticated git op in this job is the default-HEAD check above; drop
      # the checkout-persisted token before any third-party build code runs.
      - name: Scrub persisted git credentials
        run: git config --local --unset-all http.https://github.com/.extraheader || true

      # Toolchain version comes from rust-toolchain.toml (single source of truth).
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

      - name: Prebuild release binary (no signing secrets in this job)
        run: cargo build --locked --release -p app

      - name: Verify prebuilt binary is arm64 only
        run: |
          set -euo pipefail
          archs="$(lipo -archs target/release/compme)"
          if [ "$archs" != "arm64" ]; then
            echo "prebuilt release binary must contain exactly arm64, got: $archs" >&2
            exit 1
          fi

      - name: Upload prebuilt release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compme-prebuilt-binary
          if-no-files-found: error
          # Consumed only by build_release in this run; keep the unsigned
          # binary around just long enough to survive an environment-approval
          # gap, not the 90-day default.
          retention-days: 3
          path: target/release/compme

  # Signing job: consumes the binary built by the secretless prebuild job and
  # runs no cargo, no Rust toolchain, and no rust-cache — nothing untrusted
  # executes on the runner that holds the Developer-ID keychain and
  # notarization credentials. make-app.sh assembles from the downloaded binary
  # with COMPME_BUNDLE_SKIP_BUILD=1.
  build_release:
    name: Sign · bundle · package (macOS)
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [prebuild]
    environment: release
    permissions:
      contents: read
      # For actions/attest-build-provenance on the packaged zip.
      id-token: write
      attestations: write
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check release tag matches bundle metadata
        run: COMPME_EXPECTED_VERSION="${GITHUB_REF_NAME#v}" tools/bundle/check-bundle-metadata.sh

      - name: Download prebuilt release binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compme-prebuilt-binary
          path: target/release

      # actions/download-artifact drops file permissions; restore the
      # executable bit make-app.sh expects on target/release/compme.
      - name: Restore prebuilt binary executable bit
        run: chmod +x target/release/compme

      - name: Verify downloaded binary is arm64 only
        run: |
          set -euo pipefail
          archs="$(lipo -archs target/release/compme)"
          if [ "$archs" != "arm64" ]; then
            echo "downloaded release binary must contain exactly arm64, got: $archs" >&2
            exit 1
          fi

      - name: Register signing keychain cleanup path
        run: echo "COMPME_SIGNING_KEYCHAIN=$RUNNER_TEMP/compme-signing.keychain-db" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.COMPME_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.COMPME_DEVELOPER_ID_P12_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.COMPME_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          for name in P12_BASE64 P12_PASSWORD SIGNING_IDENTITY; do
            if [ -z "${!name:-}" ]; then
              echo "missing required release secret: $name" >&2
              exit 1
            fi
          done
          keychain="${COMPME_SIGNING_KEYCHAIN:?signing keychain cleanup path was not registered}"
          keychain_password="$(uuidgen)"
          p12="$RUNNER_TEMP/developer-id.p12"
          trap 'rm -f "$p12"' EXIT
          install -m 600 /dev/null "$p12"
          printf '%s' "$P12_BASE64" | base64 --decode > "$p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm -f "$p12"
          trap - EXIT
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          # Collect the existing user keychain search list without word
          # splitting (paths could contain spaces); each line is an
          # indented, quoted path.
          existing_keychains=()
          while IFS= read -r kc; do
            kc="${kc#"${kc%%[![:space:]]*}"}"
            kc="${kc%\"}"
            kc="${kc#\"}"
            if [ -n "$kc" ]; then
              existing_keychains+=("$kc")
            fi
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$keychain" ${existing_keychains[@]+"${existing_keychains[@]}"}
          {
            echo "COMPME_CODESIGN_IDENTITY=$SIGNING_IDENTITY"
          } >> "$GITHUB_ENV"

      # Reuse the project's own bundler so the released .app matches a local
      # build exactly: release binary -> Compme.app (Info.plist, compme://
      # scheme, launch-at-login) -> Developer-ID hardened-runtime signature.
      - name: Build the .app bundle
        run: COMPME_BUNDLE_SKIP_BUILD=1 tools/bundle/make-app.sh "$RUNNER_TEMP/bundle"

      # Tagged release artifacts are always Developer-ID signed and notarized;
      # the helper fails closed when no notarization credential set is present.
      # The hosted workflow passes only the App Store Connect API key set; the
      # helper's Apple-ID fallback exists for manual runs and its secrets are
      # deliberately not configured here.
      - name: Notarize and staple the .app
        env:
          COMPME_NOTARYTOOL_KEY_BASE64: ${{ secrets.COMPME_NOTARYTOOL_KEY_BASE64 }}
          COMPME_NOTARYTOOL_KEY_ID: ${{ secrets.COMPME_NOTARYTOOL_KEY_ID }}
          COMPME_NOTARYTOOL_ISSUER: ${{ secrets.COMPME_NOTARYTOOL_ISSUER }}
          # Notary --wait cap, matching the helper's 60m default (raised for a
          # freshly enrolled Apple account whose first notarizations queue for
          # hours). Tune via the COMPME_NOTARYTOOL_TIMEOUT repo variable.
          COMPME_NOTARYTOOL_TIMEOUT: ${{ vars.COMPME_NOTARYTOOL_TIMEOUT || '60m' }}
        run: tools/release/notarize-app.sh "$RUNNER_TEMP/bundle/Compme.app"

      - name: Delete signing keychain
        if: always()
        run: |
          set -euo pipefail
          keychain="${COMPME_SIGNING_KEYCHAIN:-$RUNNER_TEMP/compme-signing.keychain-db}"
          cleanup_status=0
          if [ -e "$keychain" ] && ! security delete-keychain "$keychain"; then
            echo "failed to delete signing keychain: $keychain" >&2
            cleanup_status=1
          fi
          if [ -e "$keychain" ]; then
            echo "signing keychain still exists after cleanup: $keychain" >&2
            cleanup_status=1
          fi
          unset COMPME_SIGNING_KEYCHAIN COMPME_CODESIGN_IDENTITY
          {
            echo "COMPME_SIGNING_KEYCHAIN="
            echo "COMPME_CODESIGN_IDENTITY="
          } >> "$GITHUB_ENV"
          exit "$cleanup_status"

      - name: Package + checksum
        id: pkg
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          zip="compme-${version}-macos.zip"
          # ditto preserves the .app bundle structure + resource forks.
          ditto -c -k --keepParent "$RUNNER_TEMP/bundle/Compme.app" "$zip"
          sha="$(shasum -a 256 "$zip" | awk '{print $1}')"
          printf '%s  %s\n' "$sha" "$zip" > "$zip.sha256"
          {
            echo "version=$version"
            echo "zip=$zip"
            echo "sha256=$sha"
          } >> "$GITHUB_OUTPUT"

      - name: Verify packaged app signature and notarization
        env:
          ZIP: ${{ steps.pkg.outputs.zip }}
        run: |
          set -euo pipefail
          verify_dir="$(mktemp -d "$RUNNER_TEMP/compme-package-verify.XXXXXX")"
          trap 'rm -rf "$verify_dir"' EXIT
          ditto -x -k "$ZIP" "$verify_dir"
          entry_count="$(find "$verify_dir" -mindepth 1 -maxdepth 1 -print | wc -l | tr -d ' ')"
          if [ "$entry_count" -ne 1 ] || [ ! -d "$verify_dir/Compme.app" ]; then
            echo "release zip must contain exactly one top-level Compme.app" >&2
            find "$verify_dir" -mindepth 1 -maxdepth 1 -print >&2
            exit 1
          fi
          app="$verify_dir/Compme.app"
          codesign --verify --deep --strict --verbose=2 "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"

      # Signed provenance for the exact shipped bytes: the sha256 asset is
      # produced in this same job (transport integrity only), so downstream
      # jobs and users verify the zip against a workflow-identity attestation
      # instead (gh attestation verify).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pkg.outputs.zip }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compme-release-artifacts
          if-no-files-found: error
          # Consumed by publish_release/finalize_cask in this run; the signed
          # zip lives on as a release asset, so cap the artifact copy.
          retention-days: 7
          path: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.zip }}.sha256

  publish_release:
    name: Publish release
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [build_release]
    environment: release
    permissions:
      contents: write
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compme-release-artifacts
          path: release-artifacts

      - name: Verify downloaded artifact checksum
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="compme-${VERSION}-macos.zip"
          cd release-artifacts
          test -f "$ZIP"
          test -f "$ZIP.sha256"
          shasum -a 256 -c "$ZIP.sha256"

      # The sha256 asset was written in the same job that built the zip, so it
      # proves transport integrity only; the attestation binds these bytes to
      # this workflow's identity.
      - name: Verify artifact build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          gh attestation verify "release-artifacts/compme-${VERSION}-macos.zip" --repo "$GITHUB_REPOSITORY"

      - name: Verify release tag is still at default-branch HEAD before publication
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          # Explicit refspec: see the preflight fetch comment.
          git fetch --force origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          default_sha="$(git rev-parse "origin/$DEFAULT_BRANCH")"
          if [ "$GITHUB_SHA" != "$default_sha" ]; then
            echo "release tag commit $GITHUB_SHA must still equal current origin/$DEFAULT_BRANCH HEAD $default_sha before publication" >&2
            exit 1
          fi

      - name: Write publication-time update manifest
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="compme-${VERSION}-macos.zip"
          MANIFEST="compme-${VERSION}-update.json"
          SHA256="$(awk '{print $1}' "release-artifacts/$ZIP.sha256")"
          tools/release/write-update-manifest.sh \
            "$VERSION" "$ZIP" "$SHA256" > "release-artifacts/$MANIFEST"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="compme-${VERSION}-macos.zip"
          MANIFEST="compme-${VERSION}-update.json"
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --draft \
            --generate-notes \
            "release-artifacts/$ZIP" \
            "release-artifacts/$ZIP.sha256" \
            "release-artifacts/$MANIFEST"

      - name: Revalidate default-branch HEAD and undraft GitHub release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --force origin \
            "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH" \
            "refs/tags/$GITHUB_REF_NAME:refs/tags/$GITHUB_REF_NAME"
          default_sha="$(git rev-parse "origin/$DEFAULT_BRANCH")"
          tag_sha="$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{commit}")"
          if [ "$tag_sha" != "$GITHUB_SHA" ] || [ "$tag_sha" != "$default_sha" ]; then
            echo "release tag $GITHUB_REF_NAME must still resolve to workflow commit $GITHUB_SHA and current origin/$DEFAULT_BRANCH HEAD $default_sha before undraft; got $tag_sha" >&2
            if ! gh release delete "$GITHUB_REF_NAME" --yes; then
              echo "failed to delete stale draft release $GITHUB_REF_NAME" >&2
            fi
            exit 1
          fi
          gh release edit "$GITHUB_REF_NAME" --draft=false

  # Keep cask publication in its own protected-environment job. If the push
  # fails after the GitHub release is public, GitHub can rerun this job directly
  # without attempting to recreate or replace published release assets.
  # NOTE: between undraft and this job succeeding, main's cask already names
  # the new version but still carries the previous release's sha256, so
  # `brew install --cask compme` fails closed (checksum mismatch) in that
  # window — approve and rerun this job promptly if it fails.
  finalize_cask:
    name: Finalize Homebrew cask
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: [publish_release]
    environment: release
    permissions:
      contents: write
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compme-release-artifacts
          path: release-artifacts

      - name: Verify downloaded artifact checksum
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="compme-${VERSION}-macos.zip"
          cd release-artifacts
          test -f "$ZIP"
          test -f "$ZIP.sha256"
          shasum -a 256 -c "$ZIP.sha256"

      - name: Verify artifact build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          gh attestation verify "release-artifacts/compme-${VERSION}-macos.zip" --repo "$GITHUB_REPOSITORY"

      - name: Finalize Homebrew cask
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          ZIP="compme-${VERSION}-macos.zip"
          artifact_path="$PWD/release-artifacts/$ZIP"
          tools/release/finalize-cask.sh "$TAG" "$artifact_path" "$VERSION" "$DEFAULT_BRANCH"

  # Post-publish last mile: installs the published cask and assesses the exact
  # bytes a user gets, so the pipeline verifies itself end-to-end instead of
  # relying on the manual clean-machine checklist. Secretless on purpose — the
  # job verifies *published* state, needs no environment and no secrets beyond
  # github.token, and mutates nothing (a failure blocks nothing downstream, so
  # a rerun is always safe). No checkout: nothing here reads the repository.
  post_verify:
    name: Post-publish install verification
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: finalize_cask
    permissions:
      contents: read
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      # The zip/sha256 names come from the build_release pkg step
      # (compme-<version>-macos.zip[.sha256]); gh needs --repo because this
      # job never checks out the repository.
      - name: Download published assets and verify checksum
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern "*.zip" --dir verify
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern "*.zip.sha256" --dir verify
          (cd verify && shasum -a 256 -c ./*.sha256)

      # The documented user install path (README "Install"): brew downloads the
      # release zip and checks it against the finalized cask's sha256.
      - name: Install the published cask
        run: |
          set -euo pipefail
          brew update
          brew tap mudrii/compme https://github.com/mudrii/compme
          brew install --cask compme

      - name: Assess installed app
        run: |
          set -euo pipefail
          codesign --verify --deep --strict /Applications/Compme.app
          xcrun stapler validate /Applications/Compme.app
          spctl --assess --type execute -vv /Applications/Compme.app

      # Mirrors bundle-smoke.sh's env-var contract (COMPME_CONFIG,
      # COMPME_RUN_MS, COMPME_STUB_COMPLETION) and assertions
      # (duplicate-instance rejection, bounded-run line) against the installed
      # app — the runner has no Accessibility grant, so no AX-dependent
      # behavior runs. COMPME_RUN_MS is the app-side runtime bound; the
      # background sleep is the shell-side bound, and its marker file fails
      # the step when the app ignores COMPME_RUN_MS (SIGTERM alone would exit
      # 0 through the app's graceful shutdown).
      - name: Bounded startup smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          app_log="$tmp/app.log"
          COMPME_CONFIG="$tmp/config.env" COMPME_RUN_MS=5000 \
            COMPME_STUB_COMPLETION=" smoke" \
            /Applications/Compme.app/Contents/MacOS/compme >"$app_log" 2>&1 &
          app_pid=$!
          ( sleep 60; touch "$tmp/watchdog-fired"; kill "$app_pid" 2>/dev/null || true ) &
          watchdog_pid=$!
          status=0
          wait "$app_pid" || status=$?
          kill "$watchdog_pid" 2>/dev/null || true
          wait "$watchdog_pid" 2>/dev/null || true
          cat "$app_log"
          if [ -e "$tmp/watchdog-fired" ]; then
            echo "bounded startup smoke failed: app ignored COMPME_RUN_MS=5000" >&2
            exit 1
          fi
          if [ "$status" -ne 0 ]; then
            echo "bounded startup smoke failed: app exited with status $status" >&2
            exit "$status"
          fi
          if grep -Fq 'compme: another instance is already running — exiting' "$app_log"; then
            echo "bounded startup smoke failed: installed app exited as a duplicate instance" >&2
            exit 1
          fi
          if ! grep -Fq "compme: running (acceptance_pid=None stub=true run_ms=Some(5000))" "$app_log"; then
            echo "bounded startup smoke failed: app never reached the bounded stub runtime" >&2
            exit 1
          fi
